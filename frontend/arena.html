<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche CP - Reverse & Golf</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-bg"></div>
    <nav class="navbar">
        <div class="logo">Niche<span>CP</span></div>
        <div class="nav-links">
            <a href="#" class="active">Arena</a>
            <a href="#">Leaderboard</a>
            <a href="#">Profile</a>
        </div>
    </nav>
    <main class="container">
        <header class="hero">
            <h1>Reverse Coding <span>Duel</span></h1>
            <p>Guess the hidden logic. Write the code. Defeat the judge.</p>
        </header>

        <section class="problem-arena">
            <div class="problem-statement glass-panel">
                <h2>Problem: The Hidden Sequence</h2>
                <div class="test-cases">
                    <div class="case">
                        <span class="label">Input:</span> <span class="code-val">5</span>
                        <br>
                        <span class="label">Output:</span> <span class="code-val">120</span>
                    </div>
                    <div class="case">
                        <span class="label">Input:</span> <span class="code-val">3</span>
                        <br>
                        <span class="label">Output:</span> <span class="code-val">6</span>
                    </div>
                </div>
                <p class="hint">Hint: Math is your friend.</p>
            </div>

            <div class="editor-section glass-panel">
                <div class="editor-header">
                    <select id="language" class="cyber-select">
                        <option value="python">Python 3</option>
                        <option value="cpp">C++</option>
                        <option value="go">Go</option>
                    </select>
                    <div class="action-buttons">
                        <button id="runBtn" class="cyber-btn btn-secondary">Run Code</button>
                        <button id="submitBtn" class="cyber-btn">Submit Code</button>
                    </div>
                </div>
                <textarea id="codeEditor" spellcheck="false">def solve(n):
    # Write your logic here
    pass</textarea>
                
                <div class="custom-input-section">
                    <h3>Custom Input</h3>
                    <textarea id="customInput" spellcheck="false" placeholder="Enter input values here..."></textarea>
                    
                    <h3>Terminal Output</h3>
                    <textarea id="terminalOutput" readonly placeholder="Output will appear here..."></textarea>
                </div>

                <div id="statusMessage" class="status hidden"></div>
            </div>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
