<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ICPC Amrita Nagercoil</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d0d12;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #ff4081;
        }

        .auth-link {
            color: #ff4081;
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
            display: block;
        }
        .auth-link:hover { text-decoration: underline; }

        .error-msg {
            color: #ff3232;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            color: #00ffcc;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 class="login-title">Join the Arena</h1>
        <p class="login-subtitle">Create your account to start competing</p>

        <div id="errorBox" class="error-msg"></div>
        <div id="successBox" class="success-msg"></div>

        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <button type="submit" class="google-btn" style="background: linear-gradient(90deg, #b388ff 0%, #ff4081 100%); color: white; margin-top: 10px;">
                Create Account
            </button>
        </form>

        <a href="login.html" class="auth-link">Already have an account? Sign In</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            
            try {
                const res = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successBox.textContent = data.message + ' Redirecting to login...';
                    successBox.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorBox.textContent = data.error;
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = 'Server connection failed.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
